services:
  - type: web
    name: recuperacao-judicial-copilot
    runtime: python
    plan: free
    buildCommand: cd copilot-shayer && pip install -r requirements.txt
    startCommand: cd copilot-shayer && uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
